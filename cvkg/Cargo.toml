[package]
name = "cvkg"
version.workspace = true
license.workspace = true
repository.workspace = true
description.workspace = true
edition.workspace = true

[dependencies]
cvkg-core = { path = "../cvkg-core" }
cvkg-scene = { path = "../cvkg-scene" }
cvkg-layout = { path = "../cvkg-layout" }
cvkg-anim = { path = "../cvkg-anim" }
cvkg-render-gpu = { path = "../cvkg-render-gpu", optional = true }
cvkg-render-native = { path = "../cvkg-render-native", optional = true }
cvkg-render-web = { path = "../cvkg-render-web", optional = true }
cvkg-components = { path = "../cvkg-components" }
cvkg-themes = { path = "../cvkg-themes" }
rand = "0.8"

[features]
default = []
gpu = ["dep:cvkg-render-gpu"]
native = ["dep:cvkg-render-native"]
web = ["dep:cvkg-render-web"]

[dev-dependencies]
winit = "0.30"
tokio = { version = "1.0", features = ["full"] }
pollster = "0.4.0"
