<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVKG OS - Grand Viking Longboaters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #07070f;
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --amber: #ffaa00;
            --glass-bg: rgba(5, 5, 20, 0.75);
            --glass-border: rgba(0, 255, 255, 0.3);
            --neon-glow: 0 0 8px;
            --gungnir: linear-gradient(90deg, transparent, #00ffff, #ff00ff, #00ffff, transparent);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--dark);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            color: var(--cyan);
            position: relative;
            cursor: default;
        }

        /* Scanline overlay - Subtle */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 255, 255, 0.01) 0px,
                    rgba(0, 255, 255, 0.01) 1px,
                    transparent 1px,
                    transparent 2px);
            pointer-events: none;
            z-index: 9999;
        }

        /* Glassmorphism panel */
        .panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 12px;
        }

        .panel:hover {
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        .panel.active {
            border-color: var(--cyan);
        }

        /* Desktop */
        #desktop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a1f 0%, #07070f 100%);
            overflow: hidden;
        }

        /* Desktop icons */
        .desktop-icon {
            position: absolute;
            width: 90px;
            height: 100px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            padding: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
        }

        .desktop-icon:hover {
            background: rgba(0, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        .desktop-icon.selected {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid var(--cyan);
        }

        .icon-img {
            width: 48px;
            height: 48px;
            margin: 0 auto 8px;
            background: rgba(30, 30, 45, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cyan);
        }

        .icon-name {
            font-size: 11px;
            color: #fff;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
            font-weight: 500;
        }

        /* Liquid Floating Dock */
        #dock-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 10px;
        }

        #dock {
            background: linear-gradient(135deg, rgba(30, 10, 5, 0.4), rgba(60, 20, 5, 0.4));
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 100, 0, 0.3);
            border-radius: 28px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow:
                0 15px 45px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(255, 60, 0, 0.2) inset;
            position: relative;
            overflow: hidden;
        }

        /* Circulating Hot Spots */
        #dock::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 100, 0, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(255, 200, 0, 0.2) 0%, transparent 50%);
            mix-blend-mode: color-dodge;
            animation: magma-move 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes magma-move {
            0% { transform: scale(1) translateX(-10%); opacity: 0.5; }
            50% { transform: scale(1.2) translateX(10%); opacity: 0.8; }
            100% { transform: scale(1) translateX(-10%); opacity: 0.5; }
        }

        /* Gungnir Glow Effect */
        #dock::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 200%;
            height: 2px;
            background: var(--gungnir);
            animation: gungnir-sweep 5s linear infinite;
            filter: blur(6px);
            opacity: 0.6;
        }

        @keyframes gungnir-sweep {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(50%);
            }
        }

        .dock-icon {
            width: 54px;
            height: 54px;
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--cyan);
            position: relative;
        }

        .dock-icon:hover {
            transform: translateY(-12px) scale(1.15);
            background: rgba(30, 30, 50, 0.9);
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .dock-icon svg {
            width: 28px;
            height: 28px;
            transition: all 0.3s;
        }

        .dock-icon:hover svg {
            filter: drop-shadow(0 0 8px var(--cyan));
        }

        /* Tooltip */
        .dock-icon::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(10, 10, 20, 0.9);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            border: 1px solid var(--glass-border);
        }

        .dock-icon:hover::before {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Start Menu */
        #start-menu {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            width: 420px;
            height: 520px;
            background: rgba(10, 10, 20, 0.85);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            display: none;
            flex-direction: column;
            z-index: 1001;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #start-menu.active {
            display: flex;
            transform: translateX(-50%) translateY(0);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 16px;
            border-radius: 16px;
            transition: all 0.3s;
        }

        .app-icon:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.05);
        }

        .app-icon-img {
            width: 48px;
            height: 48px;
            background: rgba(30, 30, 45, 0.8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
        }

        /* Window */
        .window {
            position: absolute;
            background: rgba(10, 10, 20, 0.7);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            min-width: 400px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            animation: windowOpen 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes windowOpen {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .window-titlebar {
            height: 40px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            padding: 0 16px;
            cursor: move;
            user-select: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .window-title {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-btn {
            background: #ff5f56;
        }

        .min-btn {
            background: #ffbd2e;
        }

        .max-btn {
            background: #27c93f;
        }

        .window-btn:hover {
            transform: scale(1.2);
            filter: brightness(1.2);
        }

        .window-content {
            flex: 1;
            color: #ccc;
            font-size: 14px;
            overflow: hidden;
            position: relative;
        }

        /* System Tray */
        #system-tray {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(10, 10, 20, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 900;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tray-icon {
            color: var(--cyan);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lightning-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0.25;
        }

        .shatter-fragment {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--cyan);
            pointer-events: none;
            z-index: 9999;
            border-radius: 50%;
        }

        /* Circular Context Menu */
        #context-menu {
            position: fixed;
            width: 200px;
            height: 200px;
            display: none;
            z-index: 10000;
            pointer-events: none;
        }

        .menu-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            z-index: 2;
        }

        .menu-item {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(10, 10, 20, 0.95);
            border: 1px solid var(--cyan);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
            transform-origin: center;
            color: #fff;
        }

        .menu-item span {
            font-size: 8px;
            font-weight: bold;
            margin-top: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .menu-item:hover {
            background: var(--cyan);
            color: #000;
            transform: scale(1.15);
            box-shadow: 0 0 20px var(--cyan);
        }

        /* List Context Menu (Files) */
        #file-menu {
            position: fixed;
            width: 160px;
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            display: none;
            z-index: 10001;
            padding: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .file-menu-item {
            padding: 8px 12px;
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .file-menu-item:hover {
            background: rgba(0, 255, 255, 0.2);
            color: var(--cyan);
        }

        /* Wanted Warning */
        #wanted-warning {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 0, 0, 0.8);
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 900;
            letter-spacing: 2px;
            display: none;
            animation: pulse 1s infinite alternate;
            z-index: 100;
        }

        @keyframes pulse {
            from { opacity: 0.5; transform: scale(1); }
            to { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>

    <script>
        // Lightning Cursor Effect
        const LightningCursor = {
            canvas: null,
            ctx: null,
            mouse: { x: -100, y: -100 },
            bolts: [],

            init() {
                this.canvas = document.createElement('canvas');
                this.canvas.style.position = 'fixed';
                this.canvas.style.top = '0';
                this.canvas.style.left = '0';
                this.canvas.style.pointerEvents = 'none';
                this.canvas.style.zIndex = '10001';
                document.body.appendChild(this.canvas);
                this.ctx = this.canvas.getContext('2d');

                window.addEventListener('resize', () => this.resize());
                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                    if (Math.random() > 0.7) this.createBolt();
                });

                this.resize();
                this.animate();
            },

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },

            createBolt() {
                this.bolts.push({
                    x: this.mouse.x,
                    y: this.mouse.y,
                    life: 1.0,
                    segments: this.generateSegments(this.mouse.x, this.mouse.y)
                });
            },

            generateSegments(x, y) {
                const segments = [];
                let curX = x, curY = y;
                for (let i = 0; i < 5; i++) {
                    const nx = curX + (Math.random() - 0.5) * 30;
                    const ny = curY + (Math.random() - 0.5) * 30;
                    segments.push({ x1: curX, y1: curY, x2: nx, y2: ny });
                    curX = nx; curY = ny;
                }
                return segments;
            },

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.strokeStyle = '#00ffff';
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = '#00ffff';

                for (let i = this.bolts.length - 1; i >= 0; i--) {
                    const b = this.bolts[i];
                    b.life -= 0.1;
                    if (b.life <= 0) {
                        this.bolts.splice(i, 1);
                        continue;
                    }

                    this.ctx.globalAlpha = b.life;
                    this.ctx.lineWidth = 2 * b.life;
                    this.ctx.beginPath();
                    b.segments.forEach(s => {
                        this.ctx.moveTo(s.x1, s.y1);
                        this.ctx.lineTo(s.x2, s.y2);
                    });
                    this.ctx.stroke();
                }

                requestAnimationFrame(() => this.animate());
            }
        };
        LightningCursor.init();

        // Lightning System - Subtle
        const Lightning = {
            canvas: document.getElementById('lightning-canvas'),
            ctx: null,
            init() {
                this.ctx = this.canvas.getContext('2d');
                window.addEventListener('resize', () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                });
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.loop();
            },
            drawBolt(x, y, len, angle, branches) {
                if (branches <= 0 || len <= 0) return;
                const endX = x + Math.cos(angle) * len;
                const endY = y + Math.sin(angle) * len;
                this.ctx.beginPath();
                this.ctx.moveTo(x, y);
                this.ctx.lineTo(endX, endY);
                this.ctx.stroke();
                if (Math.random() > 0.8) this.drawBolt(endX, endY, len * 0.7, angle + 0.6, branches - 1);
                this.drawBolt(endX, endY, len * 0.9, angle + (Math.random() - 0.5) * 0.4, branches - 1);
            },
            loop() {
                if (Math.random() > 0.99) {
                    this.ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
                    this.ctx.lineWidth = 1;
                    this.drawBolt(Math.random() * this.canvas.width, 0, 40, Math.PI/2, 15);
                    setTimeout(() => this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height), 60);
                }
                setTimeout(() => this.loop(), 100);
            }
        };
        Lightning.init();

        // Mjolnir Shatter Logic
        const Mjolnir = {
            shatter(x, y) {
                for (let i = 0; i < 20; i++) {
                    const f = document.createElement('div');
                    f.className = 'shatter-fragment';
                    f.style.left = x + 'px'; f.style.top = y + 'px';
                    document.body.appendChild(f);
                    const a = Math.random() * Math.PI * 2;
                    const s = Math.random() * 8 + 4;
                    const vx = Math.cos(a) * s;
                    const vy = Math.sin(a) * s;
                    let o = 1;
                    const step = () => {
                        f.style.left = (parseFloat(f.style.left) + vx) + 'px';
                        f.style.top = (parseFloat(f.style.top) + vy) + 'px';
                        o -= 0.03; f.style.opacity = o;
                        if (o > 0) requestAnimationFrame(step); else f.remove();
                    };
                    requestAnimationFrame(step);
                }
                document.body.style.transform = `translate(${(Math.random()-0.5)*12}px, ${(Math.random()-0.5)*12}px)`;
                setTimeout(() => document.body.style.transform = '', 100);
            }

                const createVikingModel = (color) => {

                const wantedUI = document.createElement('div');

                deathUI.innerHTML = `<h1 id="death-msg" style="font-size:48px; color:#ff3333; margin-bottom:20px;"></h1><button id="respawn-btn" style="background:var(--cyan); color:#000; border:none; padding:15px 40px; border-radius:4px; font-weight:bold; cursor:pointer;">CONTINUE (RESPAWN)</button>`;
                container.appendChild(deathUI);

                document.getElementById('respawn-btn').onclick = () => {
                    state.health = 2;
                    state.wanted = false;
                    state.gameOver = false;
                    wantedUI.style.display = 'none';
                    deathUI.style.display = 'none';
                    player.position.set(0, 0, 0);
                    boatGroup.position.set(40, 0.5, 0);

                scene.add(ambientLight);
                const pointLight = new THREE.PointLight(0xffff00, 1.5, 20);
                player.add(pointLight);
                pointLight.position.set(0, 2, 0);

                let state = { mode: 'onFoot', prompt: null, vy: 0, jumping: false, camRot: 0, camDist: 20, health: 2, wanted: false, gameOver: false };
                const gravity = -0.015;
                const keys = {};
                
                container.addEventListener('mousedown', (e) => {
                    if (e.button === 2) state.isOrbiting = true;
                });
                window.addEventListener('mouseup', () => state.isOrbiting = false);
                container.addEventListener('mousemove', (e) => {
                    if (state.isOrbiting) {
                        state.camRot -= e.movementX * 0.01;
                    }
                });
                container.oncontextmenu = (e) => e.preventDefault();

                const onKeyDown = (e) => {
                    keys[e.code] = true;
                    if (e.code === 'Space' && !state.jumping && state.mode === 'onFoot') {
                        state.vy = 0.4;
                        state.jumping = true;
                    }
                    if (e.code === 'KeyE') {
                        const dist = player.position.distanceTo(boatGroup.position);
                        if (dist < 5) {
                            state.mode = state.mode === 'onFoot' ? 'inBoat' : 'onFoot';
                            player.visible = state.mode === 'onFoot';
                            if (state.mode === 'inBoat') {
                                wantedUI.style.display = 'block';
                                state.wanted = true;
                            }
                            if (state.mode === 'onFoot') {
                                player.position.copy(boatGroup.position);
                                player.position.x -= 5;
                            }
                        }
                    }
                };
                const onKeyUp = (e) => keys[e.code] = false;
                window.addEventListener('keydown', onKeyDown);
                window.addEventListener('keyup', onKeyUp);

                const animate = () => {
                    if (!container.parentNode) {
                        window.removeEventListener('keydown', onKeyDown);
                        window.removeEventListener('keyup', onKeyUp);
                        return;
                    }
                    requestAnimationFrame(animate);
                    const target = state.mode === 'onFoot' ? player : boatGroup;

                    if (state.gameOver) return;

                    // Jarl AI logic
                    if (state.wanted && jarlNPC) {
                        const jarlDir = target.position.clone().sub(jarlNPC.position).normalize();
                        jarlNPC.position.add(jarlDir.multiplyScalar(0.15));
                        jarlNPC.rotation.y = Math.atan2(jarlDir.x, jarlDir.z);
                        
                        const distToJarl = target.position.distanceTo(jarlNPC.position);
                        if (distToJarl < 2) {
                            if (state.mode === 'inBoat') {
                                state.gameOver = true;
                                document.getElementById('death-msg').textContent = 'BLOOD EAGLED';
                                deathUI.style.display = 'flex';
                            } else {
                                state.health -= 0.05; // Slow drain during attack
                                if (state.health <= 0) {
                                    state.gameOver = true;

                            }
                        }

                        forward.y = 0;
                        forward.normalize();
                        const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), forward).normalize();

                        const moveDir = new THREE.Vector3(0, 0, 0);
                        if (keys['KeyW']) moveDir.add(forward);
                        if (keys['KeyS']) moveDir.sub(forward);
                        if (keys['KeyA']) moveDir.add(right);
                        if (keys['KeyD']) moveDir.sub(right);

                        if (moveDir.length() > 0) {
                            moveDir.normalize().multiplyScalar(0.2);
                            const nextPos = player.position.clone().add(moveDir);
                            
                            // Sleipnir Collision: Boat Clipping Prevention
                            const distToBoat = nextPos.distanceTo(boatGroup.position);
                            if (distToBoat > 4.5) {
                                player.position.copy(nextPos);
                                player.rotation.y = Math.atan2(moveDir.x, moveDir.z);
                            }
                        }
                        state.vy += gravity;
                        player.position.y += state.vy;
                        if (player.position.y <= 0) {
                            player.position.y = 0;
                            state.vy = 0;
                            state.jumping = false;
                        }
                    } else {
                         const speed = 0.4;
                         if (keys['KeyW']) boatGroup.position.z -= speed;
                         if (keys['KeyS']) boatGroup.position.z += speed;
                         if (keys['KeyA']) boatGroup.position.x -= speed;
                         if (keys['KeyD']) boatGroup.position.x += speed;
                    }

                    const distToBoat = player.position.distanceTo(boatGroup.position);
                    if (distToBoat < 5 && state.mode === 'onFoot') {
                        if (!state.prompt) {
                            state.prompt = document.createElement('div');
                            state.prompt.style.position = 'absolute';
                            state.prompt.style.top = '20px';
                            state.prompt.style.left = '50%';
                            state.prompt.style.transform = 'translateX(-50%)';
                            state.prompt.style.background = 'rgba(0,0,0,0.8)';
                            state.prompt.style.color = 'var(--cyan)';
                            state.prompt.style.padding = '10px 20px';
                            state.prompt.style.borderRadius = '20px';
                            state.prompt.style.border = '1px solid var(--cyan)';
                            state.prompt.textContent = 'PRESS [E] TO STEAL BOAT';
                            container.appendChild(state.prompt);
                        }
                    } else if (state.prompt) {
                        state.prompt.remove();
                        state.prompt = null;
                    }
                    camera.position.x = target.position.x + Math.sin(state.camRot) * state.camDist;
                    camera.position.z = target.position.z + Math.cos(state.camRot) * state.camDist;
                    camera.position.y = target.position.y + 10;
                    camera.lookAt(target.position);
                    renderer.render(scene, camera);
                };
                animate();
            },

            focusWindow(name) {
                const win = this.windows[name];
                if (!win) return;
                win.element.style.zIndex = ++this.zIndex;
                win.minimized = false;
                win.element.style.display = 'flex';
            },

            minimizeWindow(name) {
                this.windows[name].element.style.display = 'none';
                this.windows[name].minimized = true;
            },

            maximizeWindow(name) {
                const win = this.windows[name].element;
                if (win.style.width !== '100%') {
                    win.dataset.oldStyle = win.getAttribute('style');
                    win.style.left = '0';
                    win.style.top = '0';
                    win.style.width = '100%';
                    win.style.height = '100%';
                    win.style.borderRadius = '0';
                } else {
                    win.setAttribute('style', win.dataset.oldStyle);
                }
            },

            closeWindow(name) {
                this.windows[name].element.remove();
                delete this.windows[name];
            },

            startDrag(e, name) {
                const win = this.windows[name].element;
                this.focusWindow(name);
                const rect = win.getBoundingClientRect();
                const shiftX = e.clientX - rect.left;
                const shiftY = e.clientY - rect.top;
                function moveAt(pageX, pageY) {
                    win.style.left = pageX - shiftX + 'px';
                    win.style.top = pageY - shiftY + 'px';
                }
                function onMouseMove(event) { moveAt(event.clientX, event.clientY); }
                document.addEventListener('mousemove', onMouseMove);
                document.onmouseup = function () {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            },

            async updateClock() {
                try {
                    const response = await fetch('/api/system/time');
                    const data = await response.json();
                    const now = new Date(data.timestamp * 1000);
                    document.getElementById('system-tray-time').textContent = now.toLocaleTimeString();
                } catch (e) {
                    const now = new Date();
                    document.getElementById('system-tray-time').textContent = now.toLocaleTimeString();
                }
            },

            setupEventListeners() {
                document.addEventListener('click', (e) => {
                    document.getElementById('context-menu').style.display = 'none';
                    document.getElementById('file-menu').style.display = 'none';
                    if (!e.target.closest('#start-menu') && !e.target.closest('.dock-icon')) {
                        document.getElementById('start-menu').classList.remove('active');
                    }
                });
            },

            showContextMenu(e) {
                if (e.target.closest('.fm-item')) return; // File menu handles this
                e.preventDefault();
                const menu = document.getElementById('context-menu');
                menu.style.display = 'block';
                menu.style.left = (e.clientX - 100) + 'px';
                menu.style.top = (e.clientY - 100) + 'px';
            },

            showFileMenu(e, path) {
                e.preventDefault();
                e.stopPropagation();
                this.selectedFilePath = path;
                const menu = document.getElementById('file-menu');
                menu.style.display = 'block';
                menu.style.left = e.clientX + 'px';
                menu.style.top = e.clientY + 'px';
            },

            fileAction(action) {
                if (!this.selectedFilePath) return;
                const parts = this.selectedFilePath.split('/');
                const name = parts.pop();
                const parentPath = parts.join('/') || '/';

                if (action === 'Delete') {
                    this.fs[parentPath].children = this.fs[parentPath].children.filter(c => c !== name);
                    delete this.fs[this.selectedFilePath];
                    this.loadAppContent('filemanager', parentPath);
                } else if (action === 'Rename') {
                    const newName = prompt('Enter new name:', name);
                    if (newName && newName !== name) {
                        this.fs[parentPath].children = this.fs[parentPath].children.map(c => c === name ? newName : c);
                        const newNodePath = parentPath === '/' ? `/${newName}` : `${parentPath}/${newName}`;
                        this.fs[newNodePath] = this.fs[this.selectedFilePath];
                        delete this.fs[this.selectedFilePath];
                        this.loadAppContent('filemanager', parentPath);
                    }
                } else if (action === 'Copy') {
                    this.clipboard = this.selectedFilePath;
                } else if (action === 'Move') {
                    if (this.clipboard) {
                        const cParts = this.clipboard.split('/');
                        const cName = cParts.pop();
                        const cParent = cParts.join('/') || '/';
                        // Remove from old
                        this.fs[cParent].children = this.fs[cParent].children.filter(c => c !== cName);
                        // Add to current
                        this.fs[parentPath].children.push(cName);
                        const newPath = parentPath === '/' ? `/${cName}` : `${parentPath}/${cName}`;
                        this.fs[newPath] = this.fs[this.clipboard];
                        delete this.fs[this.clipboard];
                        this.clipboard = null;
                        this.loadAppContent('filemanager', parentPath);
                    }
                } else if (action === 'Properties') {
                    const node = this.fs[this.selectedFilePath];
                    alert(`Path: ${this.selectedFilePath}\nType: ${node.type}\nContent: ${node.type === 'file' ? node.content.length + ' bytes' : node.children.length + ' items'}`);
                }
                document.getElementById('file-menu').style.display = 'none';
            },

            menuAction(action) {
                document.getElementById('context-menu').style.display = 'none';
                if (action === 'Settings') {
                    this.openApp('settings');
                } else if (action === 'New File') {
                    const name = 'New_File_' + Date.now() + '.txt';
                    this.fs['/Documents'].children.push(name);
                    this.fs['/Documents/' + name] = { type: 'file', content: '' };
                    this.openApp('filemanager');
                    this.loadAppContent('filemanager', '/Documents');
                } else if (action === 'New Folder') {
                    const name = 'New_Folder_' + Date.now();
                    this.fs['/'].children.push(name);
                    this.fs['/' + name] = { type: 'dir', children: [] };
                    this.openApp('filemanager');
                    this.loadAppContent('filemanager', '/');
                } else if (action === 'Refresh') {
                    window.location.reload();
                }
            },

            navigateBack() {
                if (this.currentPath === '/') return;
                const parts = this.currentPath.split('/');
                parts.pop();
                const parent = parts.join('/') || '/';
                this.loadAppContent('filemanager', parent);
            },

            setWallpaper() {
                const url = document.getElementById('bg-url-input').value;
                if (url) {
                    document.getElementById('desktop').style.background = `url('${url}') center/cover no-repeat`;
                }
            },

            openFile(path) {
                const node = this.fs[path];
                if (node.type === 'dir') {
                    this.loadAppContent('filemanager', path);
                } else if (path.endsWith('.txt') || path.endsWith('.rs')) {
                    this.editingFile = path;
                    this.openApp('editor');
                } else if (path.endsWith('.png') || path.endsWith('.jpg')) {
                    this.viewingImage = path;
                    this.openApp('imageviewer');
                }
            },

            saveFile() {
                const content = document.getElementById('editor-textarea').value;
                if (this.editingFile) {
                    this.fs[this.editingFile].content = content;
                }
            }
        };

        CVKG.init();
    </script>
</body>
