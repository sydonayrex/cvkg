[package]
publish = false
name = "adele-web-demo"
version = "0.2.15"
edition = "2024"

[features]
webgpu = []
default = ["webgpu"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
cvkg-core.workspace = true
cvkg-render-gpu.workspace = true
cvkg-vdom.workspace = true
cvkg-components.workspace = true
cvkg-themes.workspace = true
cvkg-layout.workspace = true
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
log = "0.4"
console_log = "1.0"
web-sys = { version = "0.3", features = ["Window", "HtmlCanvasElement", "Performance"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
glam = "0.33"
