<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niflheim Web Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #020205; /* Ginnungagap Background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #cvkg-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(10, 10, 20, 0.5);
            backdrop-filter: blur(5px);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00FFFF;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="status">Systems Active // Niflheim Protocol</div>
    <div id="cvkg-root">
        <div id="cvkg-container">
            <canvas id="cvkg-canvas"></canvas>
        </div>
    </div>
    <script type="module">
        import init from './pkg/niflheim_web_demo.js';
        async function run() {
            try {
                await init();
                console.log("CVKG Niflheim Demo Started");
            } catch (e) {
                console.error("Failed to start CVKG:", e);
                document.getElementById('status').textContent = "Initialization Failed";
                document.getElementById('status').style.color = "red";
            }
        }
        run();
    </script>
</body>
</html>
