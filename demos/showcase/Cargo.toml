[package]
name = "showcase"
version = "0.1.22"
edition = "2024"
license = "MPL-2.0"

[[bin]]
name = "showcase"
path = "src/main.rs"

[dependencies]
cvkg = { path = "../../cvkg", features = ["native"] }
cvkg-core = { path = "../../cvkg-core" }
cvkg-components = { path = "../../cvkg-components" }
cvkg-anim = { path = "../../cvkg-anim" }
log = "0.4"
env_logger = "0.10"
