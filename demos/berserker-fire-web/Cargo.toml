[package]
publish = false
name = "berserker-fire-web-demo"
version = "0.2.4"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
cvkg-core = { path = "../../cvkg-core" }
cvkg-components = { path = "../../cvkg-components" }
cvkg-render-web = { path = "../../cvkg-render-web" }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "HtmlElement", "HtmlCanvasElement"] }
log = "0.4"
console_error_panic_hook = "0.1"
console_log = "1.0"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
