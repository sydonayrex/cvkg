name: CVKG CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint & Format Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-lint-

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Build & Test (Matrix: Linux, macOS, Windows) ─────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libglib2.0-dev libgdk-pixbuf2.0-dev libpango1.0-dev libatk1.0-dev \
          libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
          libasound2-dev libfontconfig1-dev libssl-dev \
          libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
          libspeechd-dev libsoup-3.0-dev libxdo-dev \
          libwayland-dev libxkbcommon-dev \
          libatspi2.0-dev

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build workspace
      run: cargo build --workspace

    - name: Run tests
      run: cargo test --workspace

  # ── Release Build Verification ────────────────────────────────────────────────
  release-builds:
    name: Release Binaries
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libglib2.0-dev libgdk-pixbuf2.0-dev libpango1.0-dev libatk1.0-dev \
          libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
          libasound2-dev libfontconfig1-dev libssl-dev \
          libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
          libspeechd-dev libsoup-3.0-dev libxdo-dev \
          libwayland-dev libxkbcommon-dev \
          libatspi2.0-dev

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-release-

    - name: Build release (cvkg-cli)
      run: cargo build --release -p cvkg-cli

    - name: Build release (berserker)
      run: cargo build --release -p berserker

    - name: Build release (showcase)
      run: cargo build --release -p showcase

    - name: Verify release binaries
      run: |
        echo "=== Release Binaries ==="
        ls -la target/release/cvkg 2>/dev/null || echo "cvkg-cli binary not found"
        ls -la target/release/berserker 2>/dev/null || echo "berserker binary not found"
        ls -la target/release/showcase 2>/dev/null || echo "showcase binary not found"
        echo "=== Binary Sizes ==="
        du -h target/release/cvkg target/release/berserker target/release/showcase 2>/dev/null || true

  # ── Packages (tagged releases only) ──────────────────────────────────────────
  package:
    name: Package (${{ matrix.os }})
    needs: release-builds
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            formats: appimage,deb
          - os: macos-14
            formats: dmg,app
          - os: windows-latest
            formats: msi,app

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libglib2.0-dev libgdk-pixbuf2.0-dev libpango1.0-dev libatk1.0-dev \
          libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
          libasound2-dev libfontconfig1-dev libssl-dev \
          libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
          libspeechd-dev libsoup-3.0-dev libxdo-dev \
          libwayland-dev libxkbcommon-dev \
          libatspi2.0-dev

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-pkg-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-pkg-

    - name: Install cargo-packager
      run: cargo install cargo-packager

    - name: Package (Linux)
      if: runner.os == 'Linux'
      run: |
        for bin in cvkg-cli berserker; do
          for fmt in appimage deb; do
            cargo packager --release -p "$bin" -f "$fmt" || echo "Warning: $bin $fmt packaging failed"
          done
        done

    - name: Package (macOS)
      if: runner.os == 'macOS'
      run: |
        for bin in cvkg-cli berserker; do
          for fmt in dmg app; do
            cargo packager --release -p "$bin" -f "$fmt" || echo "Warning: $bin $fmt packaging failed"
          done
        done

    - name: Package (Windows)
      if: runner.os == 'Windows'
      run: |
        for bin in cvkg-cli berserker; do
          for fmt in msi app; do
            cargo packager --release -p "$bin" -f "$fmt" || echo "Warning: $bin $fmt packaging failed"
          done
        done

    - name: Collect artifacts
      shell: bash
      run: |
        mkdir -p artifacts
        for bin in cvkg berserker showcase; do
          for ext in "" ".exe"; do
            if [ -f "target/release/${bin}${ext}" ]; then
              cp "target/release/${bin}${ext}" "artifacts/${bin}-${runner.os}${ext}"
            fi
          done
        done
        for f in target/release/bundle/*/*; do
          [ -f "$f" ] && cp "$f" "artifacts/$(basename "$f")" 2>/dev/null || true
        done
        ls -la artifacts/ 2>/dev/null || echo "No artifacts"

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Security Audit ────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      run: cargo audit
