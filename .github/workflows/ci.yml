name: CVKG CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Version 4 feature: Reusable workflows with matrix including macOS, Linux, Windows
  build:
    name: Build Project
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    outputs:
      build-success:
        description: 'Whether the build succeeded'
        value: ${{ jobs.build.outputs.success }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Call reusable build workflow
      uses: ./.github/workflows/reusable/build.yml
      with:
        os: ${{ matrix.os }}
        rust-toolchain: stable
        build-args: --workspace

  test:
    name: Test Suite
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Call reusable test workflow
      uses: ./.github/workflows/reusable/test.yml
      with:
        os: ${{ matrix.os }}
        rust-toolchain: stable
        test-args: --workspace

  # Additional jobs for comprehensive CI (run on ubuntu-latest for consistency)
  clippy:
    name: Clippy Lint
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxi-dev libasound2-dev libfontconfig1-dev libssl-dev pkg-config libgtk-3-dev
        sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    
    - uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-
    
    - uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-
    
    - name: Run Clippy
      run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format Check
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    
    - name: Check formatting
      run: cargo fmt --workspace -- --check

  # Release job: Triggered on tags (e.g., v0.1.16)
  release:
    name: Build & Upload Release Assets
    needs: [build, test, clippy, fmt]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxi-dev libasound2-dev libfontconfig1-dev libssl-dev pkg-config libgtk-3-dev flatpak flatpak-builder
        sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

    - name: Install cargo-packager
      run: cargo install cargo-packager
    
    - name: Build release binaries
      run: |
        cargo build --release -p cvkg-cli
        cargo build --release -p berserker
        cargo build --release -p cvkg-webkit-server
    
    - name: Package Assets (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        mkdir -p assets
        cp target/release/cvkg assets/cvkg-${{ runner.os }}
        cp target/release/berserker assets/berserker-${{ runner.os }}
        cp target/release/cvkg-webkit-server assets/cvkg-webkit-server-${{ runner.os }}
        cd assets && tar -czf ../cvkg-${{ runner.os }}.tar.gz *
    
    - name: Package Assets (Windows)
      if: runner.os == 'Windows'
      run: |
        mkdir -p assets
        cp target/release/cvkg.exe assets/cvkg-Windows.exe
        cp target/release/berserker.exe assets/berserker-Windows.exe
        cp target/release/cvkg-webkit-server.exe assets/cvkg-webkit-server-Windows.exe
        Compress-Archive -Path assets/* -DestinationPath cvkg-Windows.zip

    - name: Package AppImage, Flatpak, DEB (Linux)
      if: runner.os == 'Linux'
      run: |
        cargo packager --release -p cvkg-cli -f appimage,flatpak,deb
        cargo packager --release -p berserker -f appimage,flatpak,deb

    - name: Package DMG (macOS)
      if: runner.os == 'macOS'
      run: |
        cargo packager --release -p cvkg-cli -f dmg
        cargo packager --release -p berserker -f dmg

    - name: Package MSI (Windows)
      if: runner.os == 'Windows'
      run: |
        cargo packager --release -p cvkg-cli -f msi
        cargo packager --release -p berserker -f msi
    
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          cvkg-*.tar.gz
          cvkg-*.zip
          target/**/*.AppImage
          target/**/*.deb
          target/**/*.flatpak
          target/**/*.dmg
          target/**/*.msi
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Version 4 feature: Security scanning
  security:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit
    
    - name: Run cargo-deny
      uses: EmbarkStudios/cargo-deny-action@v1
