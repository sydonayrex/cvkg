name: Build CVKG Project

on:
  workflow_call:
    inputs:
      rust-toolchain:
        required: false
        type: string
        default: 'stable'
      build-args:
        required: false
        type: string
        default: ''
      os:
        required: false
        type: string
        default: 'ubuntu-latest'
    outputs:
      build-success:
        description: 'Whether the build succeeded'
        value: ${{ jobs.build.outputs.success }}
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

jobs:
  build:
    runs-on: ${{ inputs.os }}
    outputs:
      success: ${{ job.status == 'success' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxi-dev libasound2-dev libfontconfig1-dev libssl-dev pkg-config libgtk-3-dev
        sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
    
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        components: clippy, rustfmt
    
    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-
    
    - name: Cache Cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-
    
    - name: Build project
      run: cargo build --verbose ${{ inputs.build-args }}
    
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Check formatting
      run: cargo fmt --all -- --check
